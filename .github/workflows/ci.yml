name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app-quality:
    name: App Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Lighthouse audit
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run lighthouse

      - name: Upload Lighthouse reports
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: app/.lighthouseci

  worker-quality:
    name: Worker Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/worker-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/worker-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run typecheck
        run: npm run typecheck
