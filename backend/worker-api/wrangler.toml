name = "toko-kue-api"
main = "src/index.ts"
compatibility_date = "2026-03-02"
workers_dev = true

[vars]
APP_ENV = "development"
APP_BASE_URL = "https://tokokuebusiti.com"
# FONNTE_API_KEY = ""
# RESEND_API_KEY = ""
# RESEND_FROM_EMAIL = "noreply@tokokuebusiti.com"
# ADMIN_NOTIFICATION_PHONE = "6281234567890"
# ADMIN_NOTIFICATION_EMAIL = "hello@tokokuebusiti.com"

[[d1_databases]]
binding = "DB"
database_name = "toko-kue-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "toko-kue-media"
preview_bucket_name = "toko-kue-media-preview"
